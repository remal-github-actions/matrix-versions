name: 'Compatibilities update: gradle-wrapper'

on:
  schedule:
  - cron: '43 4 * * *'
  push:
    branches:
    - main
    paths:
    - '.github/workflows/compatibilities-update-gradle-wrapper.yml'
    - 'compatibilities-update-gradle-wrapper.ts'
  workflow_dispatch:
    inputs:
      dryRun:
        required: true
        default: 'false'
        description: Set to 'true' to enable dry run
        type: choice
        options:
        - 'true'
        - 'false'

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: compatibilities-update-gradle-wrapper-${{github.ref}}
  cancel-in-progress: true

env:
  PR_BRANCH: compatibilities-update-gradle-wrapper
  PR_TITLE: 'gradle-wrapper: update Java compatibility'

defaults:
  run:
    shell: bash

jobs:
  compatibilities-update-gradle-wrapper:
    name: 'Compatibilities update: gradle-wrapper'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
    - name: Checkout repository
      uses: actions/checkout@v7
      with:
        fetch-depth: 1

    - name: Read action's Node.js version
      id: read-node-version
      uses: ./.github/workflows/actions/read-action-nodejs-version

    - name: Setup Node.js ${{steps.read-node-version.outputs.result}}
      uses: actions/setup-node@v6
      with:
        node-version: '${{steps.read-node-version.outputs.result}}'

    - name: Install dependencies
      uses: ./.github/workflows/actions/install-dependencies
      with:
        nodeVersion: '${{steps.read-node-version.outputs.result}}'

    - name: Update gradle-wrapper compatibilities
      run: |
        "$PACKAGE_MANAGER" run compatibilities-update-gradle-wrapper

    - name: Check for changes
      id: changes
      run: |
        if git diff --quiet -- global-compatibilities.json; then
          echo "No changes."
          echo "result=false" | tee -a "$GITHUB_OUTPUT"
        else
          git diff -- global-compatibilities.json
          echo "result=true" | tee -a "$GITHUB_OUTPUT"
        fi

    - name: Create or update pull request
      if: ${{steps.changes.outputs.result == 'true' && inputs.dryRun != 'true'}}
      env:
        GH_TOKEN: ${{github.token}}
      run: |
        git config user.name 'github-actions[bot]'
        git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
        git switch --force-create "$PR_BRANCH"
        git add -- global-compatibilities.json
        git commit --message "$PR_TITLE"
        git push --force origin "HEAD:refs/heads/$PR_BRANCH"
        OPEN_PRS=$( gh pr list --head "$PR_BRANCH" --state open --json number --jq 'length' )
        if [ "$OPEN_PRS" = "0" ]; then
          gh pr create \
            --head "$PR_BRANCH" \
            --title "$PR_TITLE" \
            --body "Automated update of the \`gradle-wrapper\` section in \`global-compatibilities.json\`, regenerated from the [Gradle compatibility docs](https://github.com/gradle/gradle/blob/master/platforms/documentation/docs/src/docs/userguide/releases/compatibility.adoc) by the \`compatibilities-update-gradle-wrapper\` workflow."
        else
          echo "An open pull request for branch '$PR_BRANCH' already exists, updated it via push."
        fi

    - name: Close stale pull request
      if: ${{steps.changes.outputs.result != 'true' && inputs.dryRun != 'true'}}
      env:
        GH_TOKEN: ${{github.token}}
      run: |
        PR_NUMBER=$( gh pr list --head "$PR_BRANCH" --state open --json number --jq '.[0].number // empty' )
        if [ -n "$PR_NUMBER" ]; then
          gh pr close "$PR_NUMBER" \
            --comment "global-compatibilities.json on main is up-to-date with the Gradle compatibility docs, closing." \
            --delete-branch
        fi
